
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Request a Demo | Syncsity AI Voice Agents</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css">
</head>
<body class="bg-gray-50">
  <header class="bg-white shadow-md py-4">
    <div class="container mx-auto px-4 flex justify-between items-center">
      <a href="/" class="flex items-center">
        <img src="/lovable-uploads/be33e42d-0f53-4f97-ba95-57857d42d4b5.png" alt="Syncsity Logo" class="h-10">
      </a>
      <nav class="hidden md:block">
        <ul class="flex space-x-6">
          <li><a href="/" class="text-gray-700 hover:text-blue-600">Home</a></li>
          <li><a href="/services/voice-agents" class="text-gray-700 hover:text-blue-600">Voice Agents</a></li>
          <li><a href="/contact.html" class="text-gray-700 hover:text-blue-600">Contact</a></li>
        </ul>
      </nav>
    </div>
  </header>

  <main class="py-12">
    <div class="container mx-auto px-4">
      <div class="max-w-4xl mx-auto bg-white rounded-lg shadow-lg overflow-hidden">
        <div class="p-8 md:p-12">
          <h1 class="text-3xl font-bold text-gray-800 mb-6">Request an AI Voice Agent Demo</h1>
          <p class="text-gray-600 mb-8">
            Experience our advanced AI Voice Agents in action. Complete the form below to schedule a personalized demonstration.
          </p>

          <div id="demo-flash" style="display:none;" class="mb-6 px-4 py-3 rounded-md"></div>

          <form action="/api/contact" method="POST" id="demo-form">
            <input type="text" name="website" tabindex="-1" autocomplete="off" style="position:absolute;left:-9999px" aria-hidden="true">
            <input type="hidden" name="_return" value="/demo.html">
            <input type="hidden" name="gdpr_consent" value="1">
            <input type="hidden" name="name" id="hidden-name">
            <input type="hidden" name="subject" id="hidden-subject" value="Demo Request">
            <input type="hidden" name="message" id="hidden-message">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-6">
              <div>
                <label for="firstName" class="block text-sm font-medium text-gray-700 mb-1">First Name</label>
                <input type="text" id="firstName" name="firstName" class="w-full px-4 py-2 border border-gray-300 rounded-md focus:ring-blue-500 focus:border-blue-500" required>
              </div>
              <div>
                <label for="lastName" class="block text-sm font-medium text-gray-700 mb-1">Last Name</label>
                <input type="text" id="lastName" name="lastName" class="w-full px-4 py-2 border border-gray-300 rounded-md focus:ring-blue-500 focus:border-blue-500" required>
              </div>
            </div>
            
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-6">
              <div>
                <label for="email" class="block text-sm font-medium text-gray-700 mb-1">Email Address</label>
                <input type="email" id="email" name="email" class="w-full px-4 py-2 border border-gray-300 rounded-md focus:ring-blue-500 focus:border-blue-500" required>
              </div>
              <div>
                <label for="phone" class="block text-sm font-medium text-gray-700 mb-1">Phone Number</label>
                <input type="tel" id="phone" name="phone" class="w-full px-4 py-2 border border-gray-300 rounded-md focus:ring-blue-500 focus:border-blue-500" required>
              </div>
            </div>
            
            <div class="mb-6">
              <label for="company" class="block text-sm font-medium text-gray-700 mb-1">Company Name</label>
              <input type="text" id="company" name="company" class="w-full px-4 py-2 border border-gray-300 rounded-md focus:ring-blue-500 focus:border-blue-500" required>
            </div>
            
            <div class="mb-6">
              <label for="role" class="block text-sm font-medium text-gray-700 mb-1">Your Role</label>
              <input type="text" id="role" name="role" class="w-full px-4 py-2 border border-gray-300 rounded-md focus:ring-blue-500 focus:border-blue-500" required>
            </div>
            
            <div class="mb-6">
              <label for="useCase" class="block text-sm font-medium text-gray-700 mb-1">Primary Use Case</label>
              <select id="useCase" name="useCase" class="w-full px-4 py-2 border border-gray-300 rounded-md focus:ring-blue-500 focus:border-blue-500" required>
                <option value="">Select your primary use case</option>
                <option value="Sales">Sales Outreach</option>
                <option value="Customer Support">Customer Support</option>
                <option value="Appointment Scheduling">Appointment Scheduling</option>
                <option value="Lead Qualification">Lead Qualification</option>
                <option value="Other">Other (Please specify)</option>
              </select>
            </div>
            
            <div class="mb-6">
              <label for="details" class="block text-sm font-medium text-gray-700 mb-1">Additional Details</label>
              <textarea id="details" name="details" rows="4" class="w-full px-4 py-2 border border-gray-300 rounded-md focus:ring-blue-500 focus:border-blue-500"></textarea>
            </div>
            
            <div>
              <button type="submit" class="px-6 py-3 bg-blue-600 text-white font-medium rounded-md hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:ring-offset-2">
                Request Demo
              </button>
              <span class="ml-3 text-sm text-gray-500">→ edward@syncsity.com</span>
            </div>
          </form>

          <script>
          (function(){
            var form = document.getElementById('demo-form');
            if (form) {
              form.addEventListener('submit', function(){
                var fn = (document.getElementById('firstName')||{}).value || '';
                var ln = (document.getElementById('lastName') ||{}).value || '';
                var role = (document.getElementById('role')||{}).value || '';
                var useCase = (document.getElementById('useCase')||{}).value || '';
                var details = (document.getElementById('details')||{}).value || '';
                var phone = (document.getElementById('phone')||{}).value || '';

                var name = (fn + ' ' + ln).trim();
                var hn = document.getElementById('hidden-name');     if (hn) hn.value = name;

                var subj = document.getElementById('hidden-subject');
                if (subj && useCase) subj.value = 'Demo Request: ' + useCase;

                var msgParts = [];
                if (role)    msgParts.push('Role: ' + role);
                if (phone)   msgParts.push('Phone: ' + phone);
                if (useCase) msgParts.push('Primary use case: ' + useCase);
                if (details) msgParts.push('\nDetails:\n' + details);
                if (!msgParts.length) msgParts.push('Demo request from ' + name + '.');
                var hm = document.getElementById('hidden-message');  if (hm) hm.value = msgParts.join('\n');
              });
            }
            var qs = new URLSearchParams(location.search);
            var flash = document.getElementById('demo-flash');
            if (flash && qs.get('sent') === '1') {
              flash.style.display = 'block';
              flash.style.cssText += 'background:#ecfdf5;border:1px solid #6ee7b7;color:#065f46;';
              flash.textContent = "Thanks — demo request received. We'll be in touch within one business day.";
            } else if (flash && qs.get('error')) {
              flash.style.display = 'block';
              flash.style.cssText += 'background:#fef2f2;border:1px solid #fca5a5;color:#991b1b;';
              flash.textContent = qs.get('error');
            }
          })();
          </script>
        </div>
      </div>
    </div>
  </main>

  <footer class="bg-gray-800 text-white py-8">
    <div class="container mx-auto px-4">
      <div class="flex flex-col md:flex-row justify-between items-center">
        <div class="mb-4 md:mb-0">
          <img src="/lovable-uploads/03f35f21-123f-4f10-84a1-f2a66d97bc2b.png" alt="Syncsity Logo" class="h-10">
        </div>
        <div>
          <p>&copy; 2025 Syncsity. All rights reserved.</p>
        </div>
      </div>
    </div>
  </footer>
</body>
</html>
